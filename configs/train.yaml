# Training Configuration
training:
  epochs: 100
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 1e-5
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip: 1.0

# Validation
validation:
  val_split: 0.1
  val_frequency: 1  # validate every N epochs
  early_stopping:
    enabled: true
    patience: 10
    metric: "loss"

# Data Augmentation
augmentation:
  enabled: true
  mixup: true
  mixup_alpha: 0.2
  spec_augment: true
  time_mask: 30
  freq_mask: 50

# Device and Parallelization
device: "cuda"
num_workers: 4
pin_memory: true
mixed_precision: true  # Use AMP
