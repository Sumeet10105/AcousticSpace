version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acousticspace-api
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/app/datasets
      - ./saved_models:/app/saved_models
      - ./outputs:/app/outputs
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  datasets:
  models:
  outputs:
